server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Google girişi çıplak IP'de teknik olarak ÇALIŞAMAZ (Google, JS origin'in
    # geçerli bir TLD ile bitmesini zorunlu kılıyor). Karışıklığı önlemek için
    # nip.io olmayan her Host başlığı kalıcı olarak nip.io'ya yönlendirilir.
    if ($host != "45.155.124.53.nip.io") {
        return 301 http://45.155.124.53.nip.io:5173$request_uri;
    }

    # SPA: bilinmeyen yollar index.html'e düşer (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashli asset dosyaları agresif önbelleklenebilir
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
